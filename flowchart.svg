<svg xmlns="http://www.w3.org/2000/svg" width="940" height="1036" viewBox="0 0 940 1036" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334"/></marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a33"/></marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#336"/></marker>
  </defs>
  <style>
    .box  { fill:#eef2fb; stroke:#334; stroke-width:1.2; }
    .side { fill:#fdf3e3; stroke:#875; stroke-width:1.2; }
    .dia  { fill:#e8f7ea; stroke:#363; stroke-width:1.2; }
    .t    { font-size:13px; font-weight:bold; fill:#112; text-anchor:middle; }
    .s    { font-size:11px; font-style:italic; fill:#556; text-anchor:middle; }
    .l    { font-size:11px; fill:#334; }
    .edge { stroke:#334; stroke-width:1.3; fill:none; marker-end:url(#arr); }
    .loop { stroke:#a33; stroke-width:1.3; fill:none; marker-end:url(#arr-r); stroke-dasharray:5 3; }
    .fwd  { stroke:#336; stroke-width:1.3; fill:none; marker-end:url(#arr-b); stroke-dasharray:4 3; }
  </style>
  <text x="470" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#112">scrooge run — pipeline</text>
  <rect class="box" x="290" y="44" width="360" height="46" rx="6"/>
  <text class="t" x="470" y="64" text-anchor="middle">CLI entry</text>
  <text class="s" x="470" y="80" text-anchor="middle">main.rs → Cli / main()</text>
  <rect class="box" x="290" y="110" width="360" height="46" rx="6"/>
  <text class="t" x="470" y="130" text-anchor="middle">Task loop</text>
  <text class="s" x="470" y="146" text-anchor="middle">agents.rs → Orchestrator::run_task()</text>
  <rect class="box" x="290" y="176" width="360" height="94" rx="6"/>
  <text class="t" x="470" y="196" text-anchor="middle">Deterministic context  (zero LLM tokens)</text>
  <text class="s" x="470" y="212" text-anchor="middle">agents.rs → ensure_overview()  ·  overview.rs → load() / save()</text>
  <text class="s" x="470" y="228" text-anchor="middle">codemap.rs → build_cached() / brief()  ·  practices.rs → summary()</text>
  <text class="s" x="470" y="244" text-anchor="middle">gather_context() — read-only Cratchit pass</text>
  <text class="s" x="470" y="260" text-anchor="middle">tools: read_file · symbol_info · callers · callees</text>
  <rect class="box" x="290" y="290" width="360" height="46" rx="6"/>
  <text class="t" x="470" y="310" text-anchor="middle">Build Scrooge briefing — cached prefix</text>
  <text class="s" x="470" y="326" text-anchor="middle">injected into log once; provider KV-cache amortises cost</text>
  <rect class="box" x="290" y="356" width="360" height="62" rx="6"/>
  <text class="t" x="470" y="376" text-anchor="middle">Scrooge turn</text>
  <text class="s" x="470" y="392" text-anchor="middle">agents.rs → client.chat(&quot;scrooge&quot;)  ·  openrouter.rs</text>
  <text class="s" x="470" y="408" text-anchor="middle">tools: delegate_to_cratchit  ·  web_answer (≤3 total)</text>
  <polygon class="dia" points="470,438 570,468 470,498 370,468"/>
  <text class="t" x="470" y="465" text-anchor="middle">tool</text>
  <text class="t" x="470" y="481" text-anchor="middle">calls?</text>
  <rect class="box" x="290" y="518" width="360" height="46" rx="6"/>
  <text class="t" x="470" y="538" text-anchor="middle">Execute &amp; verify  (delegate_to_cratchit)</text>
  <text class="s" x="470" y="554" text-anchor="middle">agents.rs → execute_and_verify()</text>
  <rect class="box" x="290" y="584" width="360" height="62" rx="6"/>
  <text class="t" x="470" y="604" text-anchor="middle">Cratchit tool loop  (≤40 iters)</text>
  <text class="s" x="470" y="620" text-anchor="middle">agents.rs → cratchit_execute() → tool_loop()</text>
  <text class="s" x="470" y="636" text-anchor="middle">budget warning injected at 5 remaining</text>
  <rect class="box" x="290" y="666" width="360" height="46" rx="6"/>
  <text class="t" x="470" y="686" text-anchor="middle">Clamp report  (≤12 lines / 1 200 chars)</text>
  <text class="s" x="470" y="702" text-anchor="middle">agents.rs → clamp_report()</text>
  <polygon class="dia" points="470,732 570,762 470,792 370,762"/>
  <text class="t" x="470" y="759" text-anchor="middle">files</text>
  <text class="t" x="470" y="775" text-anchor="middle">changed?</text>
  <rect class="box" x="290" y="812" width="360" height="62" rx="6"/>
  <text class="t" x="470" y="832" text-anchor="middle">Check suite: format → test → lint-fix → lint</text>
  <text class="s" x="470" y="848" text-anchor="middle">checks.rs → run() / load() / run_cmd()</text>
  <text class="s" x="470" y="864" text-anchor="middle">config: .scrooge/checks.toml</text>
  <rect class="box" x="290" y="894" width="360" height="46" rx="6"/>
  <text class="t" x="470" y="914" text-anchor="middle">Append CHANGED + CHECKS to report</text>
  <text class="s" x="470" y="930" text-anchor="middle">agents.rs → execute_and_verify()</text>
  <rect class="side" x="622" y="440" width="290" height="62" rx="6"/>
  <text class="t" x="767" y="460" text-anchor="middle">Task complete  (no tool calls)</text>
  <text class="s" x="767" y="476" text-anchor="middle">checks clean / None → refresh_overview + bill</text>
  <text class="s" x="767" y="492" text-anchor="middle">checks red → inject nudge, loop back (≤2)</text>
  <rect class="side" x="20" y="440" width="256" height="62" rx="6"/>
  <text class="t" x="148" y="460" text-anchor="middle">web_answer</text>
  <text class="s" x="148" y="476" text-anchor="middle">tools.rs → web_answer()</text>
  <text class="s" x="148" y="492" text-anchor="middle">result appended to Scrooge's log</text>
  <rect class="side" x="686" y="584" width="234" height="78" rx="6"/>
  <text class="t" x="803" y="604" text-anchor="middle">Tools  (Landlock-sandboxed)</text>
  <text class="s" x="803" y="620" text-anchor="middle">tools.rs → Toolbox::dispatch()</text>
  <text class="s" x="803" y="636" text-anchor="middle">read/edit/replace_symbol · shell ·</text>
  <text class="s" x="803" y="652" text-anchor="middle">python · query_docs · helpers …</text>
  <rect class="side" x="20" y="970" width="900" height="46" rx="6"/>
  <text class="l" x="470" y="990" text-anchor="middle">Plugin/MCP mode: Claude Code plays Scrooge — mcp.rs → Server::call_tool()  ·  give_cratchit_task → agents.rs → delegate() → execute_and_verify()</text>
  <text class="l" x="470" y="1006" text-anchor="middle">hooks: session_start.py (inject brief)  ·  prompt_submit.py (practices)  ·  stop.py (scrooge check)</text>
  <line class="edge" x1="470" y1="90" x2="470" y2="110"/>
  <line class="edge" x1="470" y1="156" x2="470" y2="176"/>
  <line class="edge" x1="470" y1="270" x2="470" y2="290"/>
  <line class="edge" x1="470" y1="336" x2="470" y2="356"/>
  <line class="edge" x1="470" y1="418" x2="470" y2="438"/>
  <line class="edge" x1="470" y1="498" x2="470" y2="518"/>
  <text class="l" x="476" y="512">delegate_to_cratchit</text>
  <line class="edge" x1="470" y1="564" x2="470" y2="584"/>
  <line class="edge" x1="470" y1="646" x2="470" y2="666"/>
  <line class="edge" x1="470" y1="712" x2="470" y2="732"/>
  <line class="edge" x1="470" y1="792" x2="470" y2="812"/>
  <text class="l" x="476" y="806">yes</text>
  <line class="edge" x1="470" y1="874" x2="470" y2="894"/>
  <line class="edge" x1="570" y1="468" x2="622" y2="468"/>
  <text class="l" x="574" y="460">no</text>
  <line class="edge" x1="370" y1="468" x2="276" y2="468"/>
  <text class="l" x="308" y="460">web_answer</text>
  <line class="edge" x1="650" y1="607" x2="686" y2="607"/>
  <line class="edge" x1="686" y1="623" x2="650" y2="623"/>
  <path class="edge" d="M570,762 L658,762 L658,917 L650,917"/>
  <text class="l" x="575" y="754">no: skip checks</text>
  <path class="fwd" d="M470,940 L88,940 L88,387 L290,387"/>
  <text class="l" x="14" y="655"  fill="#336">report</text>
  <text class="l" x="14" y="669"  fill="#336">→ tool</text>
  <text class="l" x="14" y="683" fill="#336">result</text>
  <path class="fwd" d="M148,440 L148,370 L290,370"/>
  <path class="loop" d="M290,843 L224,843 L224,615 L290,615"/>
  <text class="l" x="148" y="721"  fill="#a33">checks</text>
  <text class="l" x="148" y="735"  fill="#a33">fail:</text>
  <text class="l" x="148" y="749" fill="#a33">retry (≤2)</text>
  <path class="loop" d="M912,468 L928,468 L928,387 L650,387"/>
  <text class="l" x="775" y="379" text-anchor="middle" fill="#a33">checks red: inject nudge (≤2), continue</text>
</svg>
